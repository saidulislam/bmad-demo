apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-health-dashboard
  labels:
    app: api-health-dashboard
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: api-health-dashboard
  template:
    metadata:
      labels:
        app: api-health-dashboard
    spec:
      containers:
        - name: api-health-dashboard
          image: registry.firm.internal/api-health-dashboard:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: api-health-dashboard-config
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
