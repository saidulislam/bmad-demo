apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-health-dashboard
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  rules:
    - host: api-health-dashboard.firm.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-health-dashboard
                port:
                  number: 80
  tls:
    - hosts:
        - api-health-dashboard.firm.internal
      secretName: api-health-dashboard-tls
